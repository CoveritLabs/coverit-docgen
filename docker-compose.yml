services:
  docgen:
    image: ghcr.io/coveritlabs/coverit-docgen:${DOCGEN_TAG:-dev}
    pull_policy: always
    container_name: coverit-docgen
    env_file:
      - path: ${DOCGEN_DIR}/.env
        required: false
    environment:
      # Python
      - PYTHONUNBUFFERED=1

      # Application
      - APP_NAME=${APP_NAME:-DocGen}
      - APP_VERSION=${APP_VERSION:-1.0.0}
      - DEBUG=${DEBUG:-False}
      - ENVIRONMENT=${ENVIRONMENT:-development}

      # Constants
      - MAX_SESSIONS_PER_POLL=${MAX_SESSIONS_PER_POLL:-5}
      - CONTEXT_DISTANCE_THRESHOLD=${CONTEXT_DISTANCE_THRESHOLD:-0.40}
      - BDD_RETRY_DELAY_SECONDS=${BDD_RETRY_DELAY_SECONDS:-30}
      - BDD_MAX_RETRIES=${BDD_MAX_RETRIES:-5}
      - VIDEO_RETRY_DELAY_SECONDS=${VIDEO_RETRY_DELAY_SECONDS:-30}
      - VIDEO_MAX_RETRIES=${VIDEO_MAX_RETRIES:-5}
      - VIDEO_OUTPUT_DIR=${VIDEO_OUTPUT_DIR:-artifacts/videos}
      - VIDEO_DEFAULT_WIDTH=${VIDEO_DEFAULT_WIDTH:-1280}
      - VIDEO_DEFAULT_HEIGHT=${VIDEO_DEFAULT_HEIGHT:-720}
      - VIDEO_DEFAULT_FPS=${VIDEO_DEFAULT_FPS:-30}
      - VIDEO_ACTION_SPEED=${VIDEO_ACTION_SPEED:-1.0}
      - VIDEO_RANDOM_SEED=${VIDEO_RANDOM_SEED:-42}
      - VIDEO_WINDOW_SCALE=${VIDEO_WINDOW_SCALE:-0.86}
      - VIDEO_FOCUS_ZOOM=${VIDEO_FOCUS_ZOOM:-1.4}
      - VIDEO_FOCUS_PADDING=${VIDEO_FOCUS_PADDING:-18.0}
      - VIDEO_REST_INTRO_SECONDS=${VIDEO_REST_INTRO_SECONDS:-0.20}
      - VIDEO_ZOOM_IN_SECONDS=${VIDEO_ZOOM_IN_SECONDS:-0.50}
      - VIDEO_CURSOR_MOVE_SECONDS=${VIDEO_CURSOR_MOVE_SECONDS:-0.55}
      - VIDEO_ACTION_HOLD_SECONDS=${VIDEO_ACTION_HOLD_SECONDS:-0.15}
      - VIDEO_ZOOM_OUT_SECONDS=${VIDEO_ZOOM_OUT_SECONDS:-0.65}
      - VIDEO_REST_OUTRO_SECONDS=${VIDEO_REST_OUTRO_SECONDS:-0.20}
      - VIDEO_FOCUS_PAN_SECONDS=${VIDEO_FOCUS_PAN_SECONDS:-0.35}
      - VIDEO_STICKY_CAMERA_ENABLED=${VIDEO_STICKY_CAMERA_ENABLED:-True}
      - VIDEO_STICKY_MAX_DISTANCE_PX=${VIDEO_STICKY_MAX_DISTANCE_PX:-520.0}
      - VIDEO_STICKY_MAX_AXIS_RATIO=${VIDEO_STICKY_MAX_AXIS_RATIO:-0.55}
      - VIDEO_CLICK_PRESS_FRAMES=${VIDEO_CLICK_PRESS_FRAMES:-5}
      - VIDEO_CLICK_PRESS_SCALE_MIN=${VIDEO_CLICK_PRESS_SCALE_MIN:-0.72}
      - SCENARIO_REPORT_MAX_RETRIES=${REPORT_MAX_RETRIES:-1}
      - MANUAL_REPORT_MAX_RETRIES=${MANUAL_REPORT_MAX_RETRIES:-1}

      # External Services
      - NEO4J_URL=${NEO4J_URL:-bolt://neo4j:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}

      # Poller
      - POLLER_CRON_HOURS=${POLLER_CRON_HOURS:-0,4,8,12,16,20}
      - POLLER_CRON_MINUTES=${POLLER_CRON_MINUTES:-0}
      - JIRA_REPORT_CRON_MINUTES=${JIRA_REPORT_CRON_MINUTES:-*}
      - JIRA_REPORT_POLL_BATCH_SIZE=${JIRA_REPORT_POLL_BATCH_SIZE:-3}

      # CORS
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-["http://localhost:3000"]}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    volumes:
      - ${DOCGEN_LOGS_DIR:-${DOCGEN_DIR}/logs}:/app/logs
      - ${DOCGEN_ARTIFACTS_DIR:-${DOCGEN_DIR}/artifacts}:/app/artifacts
