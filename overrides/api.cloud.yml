# Cloud override - points DocGen at externally provided services.
# Requires REDIS_URL, API_BASE_URL, and INTERNAL_SERVICE_TOKEN in .env/env.

services:
  docgen:
    environment:
      - REDIS_URL=${REDIS_URL}
      - API_BASE_URL=${API_BASE_URL:-http://api:3000/api/v1}
      - INTERNAL_SERVICE_TOKEN=${INTERNAL_SERVICE_TOKEN:-}
    depends_on: []
